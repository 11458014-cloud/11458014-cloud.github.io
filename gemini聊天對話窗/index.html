<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI 聊天</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="chat-container">
    <div class="author-tag">製作者: 陳秉鈞</div>
    <header class="chat-header">
      <div class="header-content">
        <div class="ai-avatar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <div class="header-info">
          <h1>Gemini AI</h1>
          <span class="status">線上</span>
        </div>
      </div>
    </header>

    <div class="chat-messages" id="chatMessages">
      <div class="message ai-message">
        <div class="message-avatar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <div class="message-content">
          <div class="message-text">
            你好！我是 Gemini AI，很高興為你提供幫助。你可以問我任何問題，我會盡力回答。
          </div>
          <div class="message-time">現在</div>
        </div>
      </div>
    </div>

    <div class="chat-input-container">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="輸入你的訊息..."
          rows="1"
          maxlength="2000"
        ></textarea>
        <button id="sendButton" class="send-button" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="char-count">0 / 2000</span>
        <span class="disclaimer">Gemini AI 可能會犯錯，請核實重要資訊</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
