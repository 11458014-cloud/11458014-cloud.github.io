<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字測驗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        /* 開始界面 */
        .start-screen {
            text-align: center;
        }

        .start-screen h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 測驗界面 */
        .quiz-screen {
            display: none;
        }

        .progress {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .question-container {
            margin: 30px 0;
        }

        .question {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .question h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }

        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-size: 16px;
            color: #333;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #27ae60;
            background: #27ae60;
            color: white;
        }

        .option.incorrect {
            border-color: #e74c3c;
            background: #e74c3c;
            color: white;
        }

        /* 結果界面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .score-display.pass {
            color: #27ae60;
        }

        .score-display.fail {
            color: #e74c3c;
        }

        .result-message {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .result-details {
            margin: 30px 0;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }

        .detail-item.correct {
            border-left-color: #27ae60;
        }

        .detail-item.incorrect {
            border-left-color: #e74c3c;
        }

        .detail-item-question {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .detail-item-answer {
            font-size: 14px;
            color: #666;
        }

        /* 按鈕 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .error-message {
            color: #e74c3c;
            padding: 12px;
            background: #ffe0e0;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 開始界面 -->
        <div id="startScreen" class="start-screen">
            <div class="header">
                <h1>📚 英文單字測驗</h1>
                <p>測試你的英文單字能力</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <h2>開始測驗</h2>
            <div class="input-group">
                <label for="numQuestions">測驗題數（1-100）：</label>
                <input type="number" id="numQuestions" min="1" max="100" value="10">
            </div>

            <button class="btn-primary" onclick="startQuiz()">開始測驗</button>
        </div>

        <!-- 測驗界面 -->
        <div id="quizScreen" class="quiz-screen">
            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    <span id="currentQuestion">1</span>/<span id="totalQuestions">10</span>
                </div>
            </div>

            <div class="question-container">
                <div class="question">
                    <h3>選擇中文翻譯</h3>
                    <div class="question-text" id="englishWord">HELLO</div>
                </div>

                <div class="options" id="optionsContainer"></div>
            </div>

            <button class="btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
        </div>

        <!-- 結果界面 -->
        <div id="resultScreen" class="result-screen">
            <div class="header">
                <h1>✅ 測驗完成</h1>
            </div>

            <div class="score-display" id="scoreDisplay">100</div>
            <div class="result-message" id="resultMessage">恭喜！你表現很好！</div>

            <div class="result-stats">
                <div class="stat-box">
                    <div class="stat-label">正確題數</div>
                    <div class="stat-value" id="correctCount">10</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">錯誤題數</div>
                    <div class="stat-value" id="wrongCount">0</div>
                </div>
            </div>

            <div class="result-details" id="resultDetails"></div>

            <div class="button-group">
                <button class="btn-primary" onclick="restartQuiz()">重新開始</button>
                <button class="btn-secondary" onclick="viewVocabularyList()">查看單字表</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestion = null;
        let selectedAnswer = null;
        let totalQuestions = 10;
        let currentQuestionNum = 0;
        let quizData = null;

        /**
         * 開始測驗
         */
        function startQuiz() {
            const numQuestions = parseInt(document.getElementById('numQuestions').value);

            if (isNaN(numQuestions) || numQuestions < 1 || numQuestions > 100) {
                showError('請輸入 1 到 100 之間的數字');
                return;
            }

            // 顯示加載狀態
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('quizScreen').innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加載單字...</p></div>';

            // 調用 GAS 函數初始化測驗
            google.script.run
                .withSuccessHandler(onQuizInitialized)
                .withFailureHandler(onError)
                .initializeQuiz(numQuestions);
        }

        /**
         * 測驗初始化成功
         */
        function onQuizInitialized(result) {
            if (!result.success) {
                showError(result.message);
                document.getElementById('quizScreen').style.display = 'none';
                document.getElementById('startScreen').style.display = 'block';
                return;
            }

            totalQuestions = result.totalQuestions;
            currentQuestionNum = 0;
            displayQuestion(result.firstQuestion);
        }

        /**
         * 顯示題目
         */
        function displayQuestion(question) {
            if (question.finished) {
                getAndDisplayResults();
                return;
            }

            currentQuestion = question;
            currentQuestionNum = question.questionNumber;
            selectedAnswer = null;

            // 更新進度條
            const progress = (currentQuestionNum / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = currentQuestionNum;
            document.getElementById('totalQuestions').textContent = totalQuestions;

            // 顯示單字
            document.getElementById('englishWord').textContent = question.english;

            // 顯示選項
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(option, optionDiv);
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('submitBtn').disabled = true;
        }

        /**
         * 選擇選項
         */
        function selectOption(option, element) {
            // 移除之前選擇的樣式
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // 添加選擇樣式
            element.classList.add('selected');
            selectedAnswer = option;
            document.getElementById('submitBtn').disabled = false;
        }

        /**
         * 提交答案
         */
        function submitAnswer() {
            if (!selectedAnswer) {
                return;
            }

            document.getElementById('submitBtn').disabled = true;

            google.script.run
                .withSuccessHandler(displayQuestion)
                .withFailureHandler(onError)
                .submitAnswer(selectedAnswer);
        }

        /**
         * 取得並顯示結果
         */
        function getAndDisplayResults() {
            google.script.run
                .withSuccessHandler(displayResults)
                .withFailureHandler(onError)
                .getQuizResults();
        }

        /**
         * 顯示結果
         */
        function displayResults(results) {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.textContent = results.score;
            scoreDisplay.className = 'score-display ' + (results.passed ? 'pass' : 'fail');

            const messages = {
                100: '🎉 完美！你是單字小達人！',
                90: '😄 很棒！你的英文很不錯！',
                80: '👍 不錯！繼續加油！',
                70: '💪 不錯！多練習會更好！',
                60: '✌️ 及格了！再加油就會進步！',
                0: '📚 加油！繼續練習會進步的！'
            };

            let message = messages[0];
            for (const [score, msg] of Object.entries(messages)) {
                if (results.score >= parseInt(score)) {
                    message = msg;
                }
            }

            document.getElementById('resultMessage').textContent = message;
            document.getElementById('correctCount').textContent = results.correctCount;
            document.getElementById('wrongCount').textContent = results.wrongCount;

            // 顯示詳細結果
            const detailsContainer = document.getElementById('resultDetails');
            detailsContainer.innerHTML = '';
            results.details.forEach(detail => {
                const detailDiv = document.createElement('div');
                detailDiv.className = 'detail-item ' + (detail.isCorrect ? 'correct' : 'incorrect');
                detailDiv.innerHTML = `
                    <div class="detail-item-question">
                        ${detail.questionNumber}. ${detail.english}
                    </div>
                    <div class="detail-item-answer">
                        你的答案：${detail.userAnswer}<br>
                        正確答案：${detail.correctAnswer}
                        ${detail.isCorrect ? ' ✓' : ' ✗'}
                    </div>
                `;
                detailsContainer.appendChild(detailDiv);
            });
        }

        /**
         * 重新開始測驗
         */
        function restartQuiz() {
            selectedAnswer = null;
            currentQuestion = null;
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('numQuestions').value = '10';
            document.getElementById('errorMessage').style.display = 'none';
        }

        /**
         * 查看單字表
         */
        function viewVocabularyList() {
            google.script.run
                .withSuccessHandler(displayVocabularyList)
                .withFailureHandler(onError)
                .getAllVocabulary();
        }

        /**
         * 顯示單字表
         */
        function displayVocabularyList(vocabulary) {
            alert(`總共有 ${vocabulary.length} 個單字可以練習\n\n前 10 個單字：\n${vocabulary.slice(0, 10).map(v => `${v.english} - ${v.chinese}`).join('\n')}`);
        }

        /**
         * 顯示錯誤信息
         */
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        /**
         * 處理錯誤
         */
        function onError(error) {
            console.error('Error:', error);
            showError('發生錯誤：' + error);
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }
    </script>
</body>
</html>
