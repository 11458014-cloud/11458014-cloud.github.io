<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字測驗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .progress {
            background: #f0f0f0;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .question-container {
            display: none;
        }
        
        .question-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .question-number {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .question-text {
            color: #333;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
            font-size: 16px;
            color: #333;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(5px);
        }
        
        .option.selected {
            border-color: #667eea;
            background: #e8ecff;
            color: #667eea;
            font-weight: 600;
        }
        
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-prev:hover {
            background: #e0e0e0;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 2;
        }
        
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-container {
            display: none;
            text-align: center;
        }
        
        .result-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .result-message {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .result-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .answer-review {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .answer-item {
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #e0e0e0;
            padding-left: 15px;
        }
        
        .answer-item.correct {
            border-left-color: #4caf50;
            background: #f1f8f6;
        }
        
        .answer-item.incorrect {
            border-left-color: #f44336;
            background: #fef5f5;
        }
        
        .answer-item-word {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .answer-item-status {
            font-size: 12px;
            margin-bottom: 3px;
        }
        
        .status-correct {
            color: #4caf50;
        }
        
        .status-incorrect {
            color: #f44336;
        }
        
        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            width: 100%;
        }
        
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 英文單字測驗</h1>
            <p>選擇正確的中文翻譯 - 滿分100分</p>
        </div>
        
        <!-- 載入狀態 -->
        <div id="loadingContainer" class="loading">
            <div class="spinner"></div>
            <p>載入中...</p>
        </div>
        
        <!-- 錯誤提示 -->
        <div id="errorContainer" style="display: none;"></div>
        
        <!-- 測驗容器 -->
        <div id="quizContainer" style="display: none;">
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div id="questionsContainer"></div>
            
            <div class="buttons">
                <button class="btn-prev" id="prevBtn" onclick="previousQuestion()" style="display: none;">← 上一題</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
            </div>
        </div>
        
        <!-- 結果容器 -->
        <div id="resultContainer" class="result-container">
            <div class="score-circle" id="scoreCircle">0</div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-details" id="resultDetails"></div>
            <div class="answer-review" id="answerReview"></div>
            <button class="btn-restart" onclick="restartQuiz()">重新開始</button>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let questions = [];
        let userAnswers = [];
        let quizStarted = false;

        // 初始化測驗
        async function initQuiz() {
            try {
                const response = await google.script.run.withSuccessHandler(response => {
                    if (response.success) {
                        questions = response.questions;
                        userAnswers = new Array(questions.length).fill(null);
                        showQuizContainer();
                        displayQuestion(0);
                    } else {
                        showError(response.message);
                    }
                }).withFailureHandler(error => {
                    showError("連接到 Google Apps Script 失敗: " + error);
                }).getQuestions();
            } catch (error) {
                showError("初始化失敗: " + error);
            }
        }

        // 顯示錯誤訊息
        function showError(message) {
            document.getElementById('loadingContainer').style.display = 'none';
            const errorDiv = document.getElementById('errorContainer');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `<div class="error"><strong>⚠️ 錯誤：</strong><br>${message}</div>
                <button class="btn-restart" onclick="location.reload()">重新加載</button>`;
        }

        // 顯示測驗容器
        function showQuizContainer() {
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            quizStarted = true;
        }

        // 顯示問題
        function displayQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // 更新進度條
            updateProgressBar();
            
            // 生成題目 HTML
            let questionsHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const isActive = i === index ? 'active' : '';
                const q = questions[i];
                
                let optionsHTML = '';
                q.options.forEach((option, optIdx) => {
                    let optionClass = '';
                    
                    if (userAnswers[i] !== null) {
                        const isCorrect = option === q.correctAnswer;
                        const isSelected = userAnswers[i] === optIdx;
                        
                        if (isCorrect) {
                            optionClass = 'correct';
                        } else if (isSelected && !isCorrect) {
                            optionClass = 'incorrect';
                        }
                    } else if (userAnswers[i] === optIdx) {
                        optionClass = 'selected';
                    }
                    
                    optionsHTML += `
                        <div class="option ${optionClass}" 
                             onclick="selectAnswer(${i}, ${optIdx})"
                             style="${userAnswers[i] !== null ? 'cursor: default;' : ''}">
                            ${option}
                        </div>
                    `;
                });
                
                questionsHTML += `
                    <div class="question-container ${isActive}">
                        <div class="question-number">第 ${i + 1} 題 / 共 ${questions.length} 題</div>
                        <div class="question-text">${q.word}</div>
                        <div class="options">${optionsHTML}</div>
                    </div>
                `;
            }
            
            document.getElementById('questionsContainer').innerHTML = questionsHTML;
            updateButtons();
        }

        // 選擇答案
        function selectAnswer(questionIdx, optionIdx) {
            // 如果已經選過答案且已提交，不允許再改
            if (userAnswers[questionIdx] !== null) {
                return;
            }
            
            userAnswers[questionIdx] = optionIdx;
            displayQuestion(currentQuestion);
        }

        // 下一題
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                displayQuestion(currentQuestion + 1);
            } else if (userAnswers.every(a => a !== null)) {
                // 所有題目都答完了，提交答案
                submitQuiz();
            }
        }

        // 上一題
        function previousQuestion() {
            if (currentQuestion > 0) {
                displayQuestion(currentQuestion - 1);
            }
        }

        // 更新按鈕
        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentQuestion === 0) {
                prevBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
            }
            
            const allAnswered = userAnswers.every(a => a !== null);
            
            if (currentQuestion === questions.length - 1 && allAnswered) {
                nextBtn.textContent = '提交答案 ✓';
            } else {
                nextBtn.textContent = '下一題 →';
            }
            
            nextBtn.disabled = userAnswers[currentQuestion] === null && currentQuestion === questions.length - 1 && !allAnswered;
        }

        // 更新進度條
        function updateProgressBar() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const percentage = (answeredCount / questions.length) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        // 提交測驗
        function submitQuiz() {
            google.script.run.withSuccessHandler(response => {
                if (response.success) {
                    showResults(response);
                }
            }).withFailureHandler(error => {
                showError("提交答案失敗: " + error);
            }).submitAnswers(userAnswers);
        }

        // 顯示結果
        function showResults(result) {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').classList.add('active');
            
            // 更新分數
            document.getElementById('scoreCircle').textContent = result.score;
            
            // 更新訊息
            let message = '';
            if (result.score === 100) {
                message = '🎉 完美！滿分通過！';
            } else if (result.score >= 80) {
                message = '😊 不錯！繼續加油！';
            } else if (result.score >= 60) {
                message = '💪 還不錯，再複習一下！';
            } else {
                message = '📖 需要多練習喔！';
            }
            document.getElementById('resultMessage').textContent = message;
            
            // 更新詳細資訊
            document.getElementById('resultDetails').innerHTML = `
                <div>正確答案: <strong>${result.correct}</strong> / ${result.total}</div>
                <div>正確率: <strong>${result.percentage}%</strong></div>
            `;
            
            // 更新答案詳評
            let reviewHTML = '';
            result.answers.forEach((answer, idx) => {
                const itemClass = answer.isCorrect ? 'correct' : 'incorrect';
                const statusClass = answer.isCorrect ? 'status-correct' : 'status-incorrect';
                const statusText = answer.isCorrect ? '✓ 正確' : '✗ 錯誤';
                
                reviewHTML += `
                    <div class="answer-item ${itemClass}">
                        <div class="answer-item-word">${idx + 1}. ${answer.word}</div>
                        <div class="answer-item-status">
                            <span class="${statusClass}">${statusText}</span>
                        </div>
                        <div>你的答案: ${answer.userAnswer}</div>
                        ${!answer.isCorrect ? `<div><strong>正確答案: ${answer.correctAnswer}</strong></div>` : ''}
                    </div>
                `;
            });
            document.getElementById('answerReview').innerHTML = reviewHTML;
        }

        // 重新開始
        function restartQuiz() {
            currentQuestion = 0;
            questions = [];
            userAnswers = [];
            quizStarted = false;
            
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('loadingContainer').style.display = 'block';
            document.getElementById('quizContainer').style.display = 'none';
            
            initQuiz();
        }

        // 頁面載入時初始化
        window.addEventListener('load', initQuiz);
    </script>
</body>
</html>
