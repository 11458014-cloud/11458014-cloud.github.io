<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程計算機</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display-section">
                <input type="text" id="display" class="display" placeholder="0" readonly>
                <div class="history-label">歷史</div>
                <div id="history-list" class="history-list"></div>
            </div>

            <!-- 模式切換 -->
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="basic">基本</button>
                <button class="mode-btn" data-mode="scientific">科學</button>
                <button class="mode-btn" data-mode="complex">複數</button>
                <button class="mode-btn" data-mode="matrix">矩陣</button>
                <button class="mode-btn" data-mode="units">單位</button>
            </div>

            <!-- 基本計算器模式 -->
            <div id="basic-mode" class="mode-content active">
                <div class="button-grid">
                    <button class="btn function-btn" data-action="clear">C</button>
                    <button class="btn function-btn" data-action="delete">DEL</button>
                    <button class="btn function-btn" data-action="percent">%</button>
                    <button class="btn operator-btn" data-operator="/">÷</button>

                    <button class="btn" data-value="7">7</button>
                    <button class="btn" data-value="8">8</button>
                    <button class="btn" data-value="9">9</button>
                    <button class="btn operator-btn" data-operator="*">×</button>

                    <button class="btn" data-value="4">4</button>
                    <button class="btn" data-value="5">5</button>
                    <button class="btn" data-value="6">6</button>
                    <button class="btn operator-btn" data-operator="-">−</button>

                    <button class="btn" data-value="1">1</button>
                    <button class="btn" data-value="2">2</button>
                    <button class="btn" data-value="3">3</button>
                    <button class="btn operator-btn" data-operator="+">+</button>

                    <button class="btn" data-value="0">0</button>
                    <button class="btn" data-value=".">.</button>
                    <button class="btn function-btn" data-action="negate">+/−</button>
                    <button class="btn equals-btn" data-action="equals">=</button>
                </div>
            </div>

            <!-- 科學模式 -->
            <div id="scientific-mode" class="mode-content">
                <div class="button-grid">
                    <button class="btn function-btn" data-action="clear">C</button>
                    <button class="btn function-btn" data-action="delete">DEL</button>
                    <button class="btn function-btn" data-action="percent">%</button>
                    <button class="btn operator-btn" data-operator="/">÷</button>

                    <button class="btn function-btn" data-function="sin">sin</button>
                    <button class="btn function-btn" data-function="cos">cos</button>
                    <button class="btn function-btn" data-function="tan">tan</button>
                    <button class="btn operator-btn" data-operator="*">×</button>

                    <button class="btn function-btn" data-function="sqrt">√</button>
                    <button class="btn function-btn" data-function="pow2">x²</button>
                    <button class="btn function-btn" data-function="pow3">x³</button>
                    <button class="btn operator-btn" data-operator="-">−</button>

                    <button class="btn function-btn" data-function="log">log</button>
                    <button class="btn function-btn" data-function="ln">ln</button>
                    <button class="btn function-btn" data-function="exp">e^x</button>
                    <button class="btn operator-btn" data-operator="+">+</button>

                    <button class="btn function-btn" data-function="pi">π</button>
                    <button class="btn function-btn" data-function="e">e</button>
                    <button class="btn function-btn" data-function="factorial">n!</button>
                    <button class="btn equals-btn" data-action="equals">=</button>
                </div>
            </div>

            <!-- 複數模式 -->
            <div id="complex-mode" class="mode-content">
                <div class="complex-input">
                    <div class="input-group">
                        <label>實部</label>
                        <input type="number" id="complex-real" placeholder="0" step="any">
                    </div>
                    <div class="input-group">
                        <label>虛部</label>
                        <input type="number" id="complex-imag" placeholder="0" step="any">
                    </div>
                </div>
                <div id="complex-result" class="result-box"></div>
                <div class="button-grid">
                    <button class="btn operator-btn" data-complex-op="add">複數加</button>
                    <button class="btn operator-btn" data-complex-op="subtract">複數減</button>
                    <button class="btn operator-btn" data-complex-op="multiply">複數乘</button>
                    <button class="btn operator-btn" data-complex-op="divide">複數除</button>
                    <button class="btn function-btn" data-complex-func="magnitude">模</button>
                    <button class="btn function-btn" data-complex-func="conjugate">共軛</button>
                    <button class="btn function-btn" data-complex-func="clear">清除</button>
                    <button class="btn equals-btn" data-action="equals">=</button>
                </div>
            </div>

            <!-- 矩陣模式 -->
            <div id="matrix-mode" class="mode-content">
                <div class="matrix-controls">
                    <div class="size-control">
                        <label>矩陣大小:</label>
                        <select id="matrix-size">
                            <option value="2x2">2×2</option>
                            <option value="3x3">3×3</option>
                            <option value="2x3">2×3</option>
                            <option value="3x2">3×2</option>
                        </select>
                    </div>
                    <button class="btn function-btn" id="generate-matrix">生成空矩陣</button>
                </div>
                <div id="matrix-input" class="matrix-input"></div>
                <div class="button-grid matrix-ops">
                    <button class="btn operator-btn" data-matrix-op="add">矩陣加</button>
                    <button class="btn operator-btn" data-matrix-op="subtract">矩陣減</button>
                    <button class="btn operator-btn" data-matrix-op="multiply">矩陣乘</button>
                    <button class="btn function-btn" data-matrix-func="transpose">轉置</button>
                    <button class="btn function-btn" data-matrix-func="determinant">行列式</button>
                    <button class="btn function-btn" data-matrix-func="inverse">反矩陣</button>
                    <button class="btn function-btn" data-matrix-func="clear">清除</button>
                </div>
                <div id="matrix-result" class="result-box"></div>
            </div>

            <!-- 單位轉換模式 -->
            <div id="units-mode" class="mode-content">
                <div class="units-controls">
                    <div class="unit-group">
                        <label>轉換類型:</label>
                        <select id="unit-type">
                            <option value="length">長度</option>
                            <option value="weight">重量</option>
                            <option value="temperature">溫度</option>
                            <option value="speed">速度</option>
                            <option value="area">面積</option>
                            <option value="volume">體積</option>
                        </select>
                    </div>
                    <div class="unit-group">
                        <label>數值:</label>
                        <input type="number" id="unit-value" placeholder="0" step="any">
                    </div>
                    <div class="unit-group">
                        <label>從:</label>
                        <select id="unit-from"></select>
                    </div>
                    <div class="unit-group">
                        <label>到:</label>
                        <select id="unit-to"></select>
                    </div>
                </div>
                <button class="btn equals-btn" id="convert-btn">轉換</button>
                <div id="unit-result" class="result-box"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
